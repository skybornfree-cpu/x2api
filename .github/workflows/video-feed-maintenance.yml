name: Video Feed Maintenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      tag_limit:
        description: '单次打标签扫描条数'
        required: false
        default: '500'
      apply_cleanup:
        description: '是否执行清理: true / false'
        required: false
        default: 'true'
      high_score_threshold:
        description: '高分视频保留阈值'
        required: false
        default: '20'
      event_days:
        description: 'feed_events 明细保留天数'
        required: false
        default: '14'
      video_days:
        description: '普通视频保留天数'
        required: false
        default: '45'
      public_video_days:
        description: '公共池视频保留天数'
        required: false
        default: '75'
      high_score_video_days:
        description: '高分视频保留天数'
        required: false
        default: '120'

jobs:
  maintain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r collector/requirements.txt

      - name: Seed system video targets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
        run: |
          python collector/twitter_monitor.py seed-system-targets

      - name: Backfill video tags
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          TAG_LIMIT: ${{ inputs.tag_limit || '500' }}
        run: |
          python scripts/backfill_video_tags.py --apply --limit "${TAG_LIMIT}"

      - name: Cleanup video feed data
        if: inputs.apply_cleanup != 'false'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          HIGH_SCORE_THRESHOLD: ${{ inputs.high_score_threshold || '20' }}
          EVENT_DAYS: ${{ inputs.event_days || vars.VIDEO_FEED_EVENT_DAYS || '14' }}
          VIDEO_DAYS: ${{ inputs.video_days || vars.VIDEO_FEED_VIDEO_DAYS || '45' }}
          PUBLIC_VIDEO_DAYS: ${{ inputs.public_video_days || vars.VIDEO_FEED_PUBLIC_VIDEO_DAYS || '75' }}
          HIGH_SCORE_VIDEO_DAYS: ${{ inputs.high_score_video_days || vars.VIDEO_FEED_HIGH_SCORE_VIDEO_DAYS || '120' }}
        run: |
          python scripts/cleanup_video_feed_data.py \
            --apply \
            --event-days "${EVENT_DAYS}" \
            --video-days "${VIDEO_DAYS}" \
            --public-video-days "${PUBLIC_VIDEO_DAYS}" \
            --high-score-video-days "${HIGH_SCORE_VIDEO_DAYS}" \
            --high-score-threshold "${HIGH_SCORE_THRESHOLD}"

      - name: Sync OpenSearch items
        if: vars.OPENSEARCH_SYNC_ENABLED == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENSEARCH_URL: ${{ secrets.OPENSEARCH_URL }}
        run: |
          python collector/sync_to_opensearch.py

      - name: Sync OpenSearch stats
        if: vars.OPENSEARCH_SYNC_ENABLED == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENSEARCH_URL: ${{ secrets.OPENSEARCH_URL }}
        run: |
          python collector/sync_to_opensearch.py --stats-only

      - name: Prune deleted OpenSearch docs
        if: vars.OPENSEARCH_SYNC_ENABLED == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENSEARCH_URL: ${{ secrets.OPENSEARCH_URL }}
        run: |
          python collector/sync_to_opensearch.py --prune-deleted
