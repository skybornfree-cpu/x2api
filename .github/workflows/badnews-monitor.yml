name: Bad.news Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '5,45 0-23/2 * * *'
    - cron: '25 1-23/2 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Bad.news 站点入口'
        required: false
        default: 'https://bad.news/sort-new/page-1'
      max_pages:
        description: '单次最多分页数'
        required: false
        default: '2'

jobs:
  monitor-badnews:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bad.news monitor
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          BASE_URL: ${{ inputs.base_url || vars.BADNEWS_BASE_URL || 'https://bad.news/sort-new/page-1' }}
          MAX_PAGES: ${{ inputs.max_pages || vars.BADNEWS_MONITOR_MAX_PAGES || '2' }}
        run: |
          python twitter_monitor.py monitor-badnews \
            --base-url "${BASE_URL}" \
            --max-pages "${MAX_PAGES}" \
            --retention-hours 84
