name: Attach Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Attach/911bl category entry'
        required: false
        default: 'https://attach.bslqmdvk.cc/category/zxcg/'
      max_pages:
        description: 'Max pages per run'
        required: false
        default: '1'

jobs:
  monitor-attach:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Attach monitor
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          BASE_URL: ${{ inputs.base_url || vars.ATTACH_BASE_URL || 'https://attach.bslqmdvk.cc/category/zxcg/' }}
          MAX_PAGES: ${{ inputs.max_pages || vars.ATTACH_MONITOR_MAX_PAGES || '1' }}
          RETENTION_HOURS: ${{ vars.ATTACH_RETENTION_HOURS || '84' }}
        run: |
          python twitter_monitor.py monitor-attach \
            --base-url "${BASE_URL}" \
            --max-pages "${MAX_PAGES}" \
            --retention-hours "${RETENTION_HOURS}"
