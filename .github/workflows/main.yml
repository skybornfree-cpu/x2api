name: Twitter Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

on:
  # schedule:
  #   - cron: '*/10 * * * *'
  # 定时触发已停用，当前由 UptimeRobot 等外部系统调用 workflow_dispatch。
  workflow_dispatch:
    inputs:
      shard_index:
        description: '当前分片编号 0..N-1；填 all 可在单仓库跑全部分片；默认读取仓库变量 MONITOR_SHARD_INDEX，否则 0'
        required: false
        default: ''
      shard_count:
        description: '总分片数；默认读取仓库变量 MONITOR_SHARD_COUNT，否则 4'
        required: false
        default: ''

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.matrix.outputs.shard_matrix }}
      shard_count: ${{ steps.matrix.outputs.shard_count }}

    steps:
      - name: Build shard matrix
        id: matrix
        env:
          INPUT_SHARD_INDEX: ${{ inputs.shard_index || vars.MONITOR_SHARD_INDEX || '0' }}
          INPUT_SHARD_COUNT: ${{ inputs.shard_count || vars.MONITOR_SHARD_COUNT || '4' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import json
          import os

          raw_index = (os.environ.get("INPUT_SHARD_INDEX") or "0").strip().lower()
          raw_count = (os.environ.get("INPUT_SHARD_COUNT") or "4").strip()
          try:
              shard_count = int(raw_count)
          except ValueError:
              shard_count = 4

          if shard_count <= 0:
              shard_count = 4

          if raw_index == "all":
              shards = list(range(shard_count))
          else:
              try:
                  shard_index = int(raw_index)
              except ValueError as exc:
                  raise ValueError("shard_index must be an integer or 'all'.") from exc

              if shard_index < 0 or shard_index >= shard_count:
                  raise ValueError("shard_index must be between 0 and shard_count - 1.")

              shards = [shard_index]

          matrix = {"shard": shards}
          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"shard_matrix={json.dumps(matrix)}\n")
              fh.write(f"shard_count={shard_count}\n")
          PY

  monitor:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: ${{ github.workflow }}-${{ needs.prepare.outputs.shard_count }}-${{ matrix.shard }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.shard_matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('collector/requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run monitor
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          DB_LOCK_MAX_WRITERS: ${{ needs.prepare.outputs.shard_count }}
          RETENTION_DAYS: '30'
          MAX_RECORDS: '100000'
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_COUNT: ${{ needs.prepare.outputs.shard_count }}
        run: |
          echo "Running monitor shard ${SHARD_INDEX}/${SHARD_COUNT}"
          python twitter_monitor.py monitor \
            --include-system \
            --shard-index "${SHARD_INDEX}" \
            --shard-count "${SHARD_COUNT}"
