name: Twitter Monitor

concurrency:
  group: x2ding-monitor
  cancel-in-progress: false

on:
  # schedule:
  #   - cron: '*/10 * * * *'
  # 定时触发已停用，当前由 UptimeRobot 等外部系统调用 workflow_dispatch。
  workflow_dispatch:
    inputs:
      shard_count:
        description: '监控分片数，默认 1'
        required: false
        default: '1'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.matrix.outputs.shard_matrix }}
      shard_count: ${{ steps.matrix.outputs.shard_count }}

    steps:
      - name: Build shard matrix
        id: matrix
        env:
          INPUT_SHARD_COUNT: ${{ inputs.shard_count || '1' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import json
          import os

          raw_count = (os.environ.get("INPUT_SHARD_COUNT") or "1").strip()
          try:
              shard_count = int(raw_count)
          except ValueError:
              shard_count = 1

          if shard_count <= 0:
              shard_count = 1

          matrix = {"shard": list(range(shard_count))}
          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"shard_matrix={json.dumps(matrix)}\n")
              fh.write(f"shard_count={shard_count}\n")
          PY

  monitor:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.shard_matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('collector/requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run monitor
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          RETENTION_DAYS: '30'
          MAX_RECORDS: '20000'
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_COUNT: ${{ needs.prepare.outputs.shard_count }}
        run: |
          python twitter_monitor.py monitor \
            --include-system \
            --shard-index "${SHARD_INDEX}" \
            --shard-count "${SHARD_COUNT}"
