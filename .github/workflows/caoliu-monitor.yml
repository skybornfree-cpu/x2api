name: Caoliu Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '13 */4 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Caoliu forum entry'
        required: false
        default: 'https://t66y.com/thread0806.php?fid=16'
      max_pages:
        description: 'Max pages per run'
        required: false
        default: '5'

jobs:
  monitor-caoliu:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Caoliu monitor
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENSEARCH_URL: ${{ secrets.OPENSEARCH_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          BASE_URL: ${{ inputs.base_url || vars.CAOLIU_BASE_URL || 'https://t66y.com/thread0806.php?fid=16' }}
          MAX_PAGES: ${{ inputs.max_pages || vars.CAOLIU_MONITOR_MAX_PAGES || '5' }}
          RETENTION_HOURS: ${{ vars.CAOLIU_RETENTION_HOURS || '720' }}
        run: |
          python twitter_monitor.py monitor-caoliu \
            --base-url "${BASE_URL}" \
            --max-pages "${MAX_PAGES}" \
            --retention-hours "${RETENTION_HOURS}"
