name: Manage Subscriptions And Query

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      action:
        description: '执行动作: apply_schema / register_client / subscribe_add / subscribe_remove / subscribe_set / subscribe_list / query'
        required: true
        default: 'query'
      api_key:
        description: '客户端 API key（注册客户端时可留空）'
        required: false
      label:
        description: '注册客户端时的标签'
        required: false
      targets:
        description: '订阅目标，支持逗号或换行。示例: elonmusk,OpenAI,search:AI safety'
        required: false
      keyword:
        description: '查询关键字'
        required: false
      target:
        description: '查询时按具体订阅目标过滤'
        required: false
      since:
        description: '查询起始时间，ISO 8601'
        required: false
      until:
        description: '查询结束时间，ISO 8601'
        required: false
      limit:
        description: '查询结果条数'
        required: false
        default: '20'

jobs:
  manage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run requested action
        shell: bash
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          INPUT_ACTION: ${{ inputs.action }}
          INPUT_API_KEY: ${{ inputs.api_key }}
          INPUT_LABEL: ${{ inputs.label }}
          INPUT_TARGETS: ${{ inputs.targets }}
          INPUT_TARGET: ${{ inputs.target }}
          INPUT_KEYWORD: ${{ inputs.keyword }}
          INPUT_SINCE: ${{ inputs.since }}
          INPUT_UNTIL: ${{ inputs.until }}
          INPUT_LIMIT: ${{ inputs.limit }}
        run: |
          mkdir -p ../data/query_results
          case "$INPUT_ACTION" in
            apply_schema)
              python ../scripts/apply_schema.py
              ;;
            register_client)
              cmd=(python twitter_monitor.py register-client)
              if [[ -n "$INPUT_LABEL" ]]; then
                cmd+=(--label "$INPUT_LABEL")
              fi
              "${cmd[@]}" | tee ../data/query_results/register-client.json
              ;;
            subscribe_add)
              python twitter_monitor.py subscribe add --api-key "$INPUT_API_KEY" --targets "$INPUT_TARGETS"
              ;;
            subscribe_remove)
              python twitter_monitor.py subscribe remove --api-key "$INPUT_API_KEY" --targets "$INPUT_TARGETS"
              ;;
            subscribe_set)
              python twitter_monitor.py subscribe set --api-key "$INPUT_API_KEY" --targets "$INPUT_TARGETS"
              ;;
            subscribe_list)
              python twitter_monitor.py subscribe list --api-key "$INPUT_API_KEY"
              ;;
            query)
              cmd=(python twitter_monitor.py query --limit "$INPUT_LIMIT" --output ../data/query_results/query-result.json)
              if [[ -n "$INPUT_API_KEY" ]]; then
                cmd+=(--api-key "$INPUT_API_KEY")
              fi
              if [[ -n "$INPUT_TARGET" ]]; then
                cmd+=(--target "$INPUT_TARGET")
              fi
              if [[ -n "$INPUT_KEYWORD" ]]; then
                cmd+=(--keyword "$INPUT_KEYWORD")
              fi
              if [[ -n "$INPUT_SINCE" ]]; then
                cmd+=(--since "$INPUT_SINCE")
              fi
              if [[ -n "$INPUT_UNTIL" ]]; then
                cmd+=(--until "$INPUT_UNTIL")
              fi
              "${cmd[@]}"
              ;;
            *)
              echo "Unsupported action: $INPUT_ACTION"
              exit 1
              ;;
          esac

      - name: Upload query result artifact
        if: inputs.action == 'query'
        uses: actions/upload-artifact@v4
        with:
          name: query-result
          path: data/query_results/query-result.json
          if-no-files-found: error

      - name: Upload register artifact
        if: inputs.action == 'register_client'
        uses: actions/upload-artifact@v4
        with:
          name: register-client
          path: data/query_results/register-client.json
          if-no-files-found: error
