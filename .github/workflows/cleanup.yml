name: Cleanup Stored Tweets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '23 2 * * *'
  workflow_dispatch:
    inputs:
      retention_days:
        description: '保留天数'
        required: false
        default: '30'
      max_records:
        description: '最大保留记录数'
        required: false
        default: '100000'

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run cleanup
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          RETENTION_DAYS: ${{ inputs.retention_days || '30' }}
          MAX_RECORDS: ${{ inputs.max_records || '100000' }}
        run: |
          python twitter_monitor.py cleanup \
            --retention-days "${RETENTION_DAYS}" \
            --max-records "${MAX_RECORDS}"
