name: BDRQ Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '11,51 0-23/2 * * *'
    - cron: '31 1-23/2 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: '背德人妻站点入口'
        required: false
        default: 'https://g3h4i5j6.bdrq45.cc'
      max_pages:
        description: '单次每个列表最多分页数'
        required: false
        default: '1'

jobs:
  monitor-bdrq:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run BDRQ monitor
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          BASE_URL: ${{ inputs.base_url || vars.BDRQ_BASE_URL || 'https://g3h4i5j6.bdrq45.cc' }}
          MAX_PAGES: ${{ inputs.max_pages || vars.BDRQ_MONITOR_MAX_PAGES || '1' }}
        run: |
          python twitter_monitor.py monitor-bdrq \
            --base-url "${BASE_URL}" \
            --max-pages "${MAX_PAGES}" \
            --retention-hours 84
