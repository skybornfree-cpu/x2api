name: YouTube Playback Refresh

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: '单次最多处理条数'
        required: false
        default: '30'
      refresh_window_minutes:
        description: '普通刷新窗口'
        required: false
        default: '90'
      critical_window_minutes:
        description: '临界过期窗口'
        required: false
        default: '15'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh YouTube playback URLs
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          LIMIT: ${{ inputs.limit || '30' }}
          REFRESH_WINDOW_MINUTES: ${{ inputs.refresh_window_minutes || '90' }}
          CRITICAL_WINDOW_MINUTES: ${{ inputs.critical_window_minutes || '15' }}
        run: |
          python twitter_monitor.py refresh-youtube-playback-urls \
            --limit "${LIMIT}" \
            --refresh-window-minutes "${REFRESH_WINDOW_MINUTES}" \
            --critical-window-minutes "${CRITICAL_WINDOW_MINUTES}"
