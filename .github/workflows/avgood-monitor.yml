name: AvGood Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '19,59 0-23/2 * * *'
    - cron: '39 1-23/2 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'AvGood site entry'
        required: false
        default: 'https://avgood.com/c/664/'
      max_pages:
        description: 'Max pages per run'
        required: false
        default: '1'

jobs:
  monitor-avgood:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AvGood monitor
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          BASE_URL: ${{ inputs.base_url || vars.AVGOOD_BASE_URL || 'https://avgood.com/c/664/' }}
          MAX_PAGES: ${{ inputs.max_pages || vars.AVGOOD_MONITOR_MAX_PAGES || '1' }}
        run: |
          python twitter_monitor.py monitor-avgood \
            --base-url "${BASE_URL}" \
            --max-pages "${MAX_PAGES}" \
            --retention-hours 84
