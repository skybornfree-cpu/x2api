name: 91cg Video Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: '91吃瓜网站点入口'
        required: false
        default: 'https://www.91cg1.com'
      max_pages:
        description: '单次最多分页数'
        required: false
        default: '4'

jobs:
  monitor-91cg:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run 91cg monitor
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          BASE_URL: ${{ inputs.base_url || vars.CG91_BASE_URL || 'https://www.91cg1.com' }}
          MAX_PAGES: ${{ inputs.max_pages || vars.CG91_MONITOR_MAX_PAGES || '4' }}
        run: |
          python twitter_monitor.py monitor-91cg \
            --base-url "${BASE_URL}" \
            --max-pages "${MAX_PAGES}" \
            --retention-hours 84
