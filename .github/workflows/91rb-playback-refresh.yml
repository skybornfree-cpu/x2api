name: 91rb Playback Refresh

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: '单次最多处理条数'
        required: false
        default: '30'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh 91rb playback URLs
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_NAMESPACE: x2api
          LIMIT: ${{ inputs.limit || '30' }}
        run: |
          python twitter_monitor.py refresh-91rb-playback-urls --limit "${LIMIT}"
